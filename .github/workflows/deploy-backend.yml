name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/workers/**"
      - "modules/**"
      - "database/**"
      - "shared/**"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cruxaffairs-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cruxaffairs-backend:${{ github.sha }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cruxaffairs-backend:${{ github.sha }}
